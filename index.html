<script>
    // 1. 네이버 마케팅 링크 (원본)
    const MKT_LINK = "https://mkt.shopping.naver.com/link/69a8ff184a57b458ec7a3fdc";

    // 2. 현재 브릿지 페이지 주소창에 붙은 모든 파라미터 (?nt_source=... 등)
    const currentParams = window.location.search;

    // 3. 파라미터 결합 로직 (유실 방지)
    let finalDestination = MKT_LINK;
    if (currentParams) {
        // 마케팅 링크에 이미 ?가 있으면 &로, 없으면 ?로 파라미터를 연결합니다.
        const separator = MKT_LINK.indexOf('?') !== -1 ? '&' : '';
        if (separator === '&') {
            finalDestination += separator + currentParams.substring(1);
        } else {
            finalDestination += currentParams;
        }
    }

    // 4. 실행 로직
    const ua = navigator.userAgent.toLowerCase();
    if (ua.indexOf('kakaotalk') !== -1) {
        // 카카오톡 탈출 (전체 URL 인코딩 필수)
        location.href = "kakaotalk://web/openExternal?url=" + encodeURIComponent(finalDestination);
    } else {
        // 이미 외부 브라우저라면 바로 이동
        location.replace(finalDestination);
    }
</script>
